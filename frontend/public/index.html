                padding: 16px;
                padding-bottom: calc(16px + env(safe-area-inset-bottom));
                display: none;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                z-index: 10000;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
                animation: slideUp 0.3s ease-out;
            }
            
            @keyframes slideUp {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }
            
            .pwa-install-banner.show {
                display: flex;
            }
            
            .pwa-install-content {
                display: flex;
                align-items: center;
                gap: 12px;
                flex: 1;
            }
            
            .pwa-install-icon {
                width: 48px;
                height: 48px;
                border-radius: 12px;
                background: #E31A1A;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            
            .pwa-install-text h4 {

                font-size: 14px;

            }
            
            .pwa-install-text p {

                padding: 8px;

                    scrollbar-width: none;

        <div id="root"></div>
        
        <!-- PWA Install Banner -->
        <div id="pwa-install-banner" class="pwa-install-banner">
            <div class="pwa-install-content">
                <div class="pwa-install-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="6" width="20" height="12" rx="2"/>
                        <path d="M12 12h.01"/>
                        <path d="M17 12h.01"/>
                        <path d="M7 12h.01"/>
                    </svg>
                </div>
                <div class="pwa-install-text">
                    <h4>Instalar CRA Construtora</h4>
                    <p>Adicione à tela inicial para acesso rápido</p>
                </div>
            </div>
            <button id="pwa-install-btn" class="pwa-install-btn">Instalar</button>
            <button id="pwa-close-btn" class="pwa-install-close">&times;</button>
        </div>
        
        <!-- Service Worker Registration DISABLED -->
        <script>
            // Unregister any existing service workers to fix caching issues
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister();
                        console.log('ServiceWorker unregistered');
                    }
                });
            }
            
            // PWA Install Prompt
            let deferredPrompt;
            const installBanner = document.getElementById('pwa-install-banner');
            const installBtn = document.getElementById('pwa-install-btn');
            const closeBtn = document.getElementById('pwa-close-btn');
            
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                
                // Check if user dismissed before
                const dismissed = localStorage.getItem('pwa-install-dismissed');
                if (!dismissed) {
                    setTimeout(() => {
                        installBanner.classList.add('show');
                    }, 3000);
                }
            });
            
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log('User response:', outcome);
                    deferredPrompt = null;
                    installBanner.classList.remove('show');
                }
            });
            
            closeBtn.addEventListener('click', () => {
                installBanner.classList.remove('show');
                localStorage.setItem('pwa-install-dismissed', 'true');
            });
            
            window.addEventListener('appinstalled', () => {
                installBanner.classList.remove('show');
                console.log('PWA installed');
            });
        </script>
